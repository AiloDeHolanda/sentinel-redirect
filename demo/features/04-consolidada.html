<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vista Consolidada — Sentinel Invest</title>
  <meta name="description" content="Múltiplas corretoras, múltiplas moedas — uma carteira só. Vista consolidada agrega posições cross-broker e converte automaticamente para a moeda da sua escolha." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:        #F97316;
      --orange-light:  #FB923C;
      --orange-dark:   #EA6C0A;
      --orange-glow:   rgba(249, 115, 22, 0.25);
      --orange-subtle: rgba(249, 115, 22, 0.08);
      --bg:            #0A0A0B;
      --bg-card:       #111113;
      --bg-elevated:   #18181B;
      --border:        rgba(255, 255, 255, 0.07);
      --border-orange: rgba(249, 115, 22, 0.3);
      --text:          #FAFAFA;
      --text-muted:    #A1A1AA;
      --text-faint:    #52525B;
      --green:         #34D399;
      --red:           #F87171;
      --yellow:        #FBBF24;
      --gold:          #C9A84C;
      --radius-sm:     8px;
      --radius:        14px;
      --radius-lg:     22px;
      --transition:    0.2s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      max-width: 960px;
      margin-inline: auto;
      padding-inline: 24px;
      position: relative;
      z-index: 1;
    }

    /* ── NAV ──────────────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 11, 0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .nav-logo-icon {
      width: 32px; height: 32px;
      background: var(--orange);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-back {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: border-color var(--transition), color var(--transition);
    }

    .nav-back:hover {
      border-color: var(--border-orange);
      color: var(--text);
    }

    /* ── Lang Selector ─────────────────────────────────────── */
    .lang-selector { position: relative; }

    .lang-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 11px;
      cursor: pointer;
      transition: border-color var(--transition), color var(--transition);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
    }

    .lang-btn:hover,
    .lang-btn[aria-expanded="true"] { border-color: var(--border-orange); color: var(--text); }

    .lang-flag { font-size: 15px; line-height: 1; }
    .lang-code { letter-spacing: 0.04em; }

    .lang-chevron {
      font-size: 10px;
      transition: transform var(--transition);
      opacity: 0.6;
    }

    .lang-btn[aria-expanded="true"] .lang-chevron { transform: rotate(180deg); opacity: 1; }

    .lang-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      min-width: 148px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateY(-6px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
      z-index: 200;
    }

    .lang-dropdown.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .lang-option {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }

    .lang-option:hover { background: var(--orange-subtle); color: var(--text); }
    .lang-option.active { color: var(--orange-light); background: var(--orange-subtle); }
    .lang-option-sep { height: 1px; background: var(--border); }

    /* ── HERO ─────────────────────────────────────────────── */
    .hero {
      position: relative;
      padding: 72px 0 48px;
      overflow: hidden;
    }

    .hero-glow {
      position: absolute;
      top: -250px; left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 600px;
      background: radial-gradient(ellipse at center, rgba(249,115,22,0.14) 0%, transparent 70%);
      pointer-events: none;
    }

    .breadcrumb {
      font-size: 13px;
      color: var(--text-faint);
      margin-bottom: 18px;
    }

    .breadcrumb a { color: var(--text-muted); transition: color var(--transition); }
    .breadcrumb a:hover { color: var(--orange-light); }

    .hero h1 {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    .hero h1 .highlight { color: var(--orange); }

    .hero .lede {
      font-size: 18px;
      color: var(--text-muted);
      max-width: 640px;
      line-height: 1.7;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--orange-subtle);
      border: 1px solid var(--border-orange);
      color: var(--orange-light);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 22px;
    }

    /* ── SECTIONS ─────────────────────────────────────────── */
    section { position: relative; }

    .section-block { padding: 48px 0; }

    .section-block h2 {
      font-size: clamp(24px, 3vw, 32px);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .section-block .kicker {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--orange-light);
      margin-bottom: 10px;
    }

    .section-block p {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 680px;
    }

    /* ── PROBLEM ──────────────────────────────────────────── */
    .problem-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-top: 24px;
      border-left: 3px solid var(--gold);
    }

    .problem-card strong { color: var(--text); font-weight: 600; }

    /* ── STEPS ────────────────────────────────────────────── */
    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 28px;
    }

    @media (max-width: 720px) { .steps { grid-template-columns: 1fr; } }

    .step {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      position: relative;
    }

    .step-number {
      width: 36px; height: 36px;
      background: var(--orange-subtle);
      border: 1px solid var(--border-orange);
      color: var(--orange-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 14px;
    }

    .step h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .step p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* ── VIDEO ────────────────────────────────────────────── */
    .video-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 8px;
      margin-top: 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    .video-embed {
      position: relative;
      aspect-ratio: 16 / 9;
      background: var(--bg-elevated);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .video-embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--text-muted);
      background: radial-gradient(ellipse at center, rgba(249,115,22,0.08) 0%, transparent 60%);
    }

    .video-placeholder-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--orange);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      padding-left: 5px;
      box-shadow: 0 0 40px var(--orange-glow);
    }

    .video-placeholder span { font-size: 14px; letter-spacing: 0.04em; }

    .video-caption {
      text-align: center;
      font-size: 13px;
      color: var(--text-faint);
      margin-top: 14px;
    }

    /* ── WHY ──────────────────────────────────────────────── */
    .why-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 28px;
    }

    @media (max-width: 720px) { .why-grid { grid-template-columns: 1fr; } }

    .why-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 20px 22px;
      position: relative;
    }

    .why-card .icon {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .why-card h4 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .why-card p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* ── EXAMPLE ──────────────────────────────────────────── */
    .example-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-top: 28px;
    }

    .example-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .example-title { font-size: 18px; font-weight: 700; }

    .example-meta { font-size: 13px; color: var(--text-faint); }
    .example-meta .pos { color: var(--green); }

    .regime-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.25);
      color: var(--green);
    }

    .regime-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px rgba(52,211,153,0.6);
    }

    .example-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .example-table th,
    .example-table td {
      padding: 10px 8px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .example-table th {
      color: var(--text-faint);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .example-table td { color: var(--text-muted); }

    .example-table td.ticker { color: var(--text); font-weight: 600; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .pill.type-etf    { background: rgba(249,115,22,0.08);  color: var(--orange-light); border: 1px solid var(--border-orange); }
    .pill.type-stock  { background: rgba(96,165,250,0.08);  color: #93C5FD; border: 1px solid rgba(96,165,250,0.3); }
    .pill.type-crypto { background: rgba(251,191,36,0.08);  color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
    .pill.type-cash   { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid var(--border); }

    .commentary {
      margin-top: 24px;
      padding: 20px 22px;
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--orange);
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .commentary strong { color: var(--text); font-weight: 600; }

    .commentary-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--orange-light);
      margin-bottom: 8px;
    }

    .disclaimer {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      font-size: 12px;
      color: var(--text-faint);
      margin-top: 32px;
      text-align: center;
      line-height: 1.6;
    }

    /* ── CTA ──────────────────────────────────────────────── */
    .cta {
      padding: 72px 0 96px;
      text-align: center;
    }

    .cta h2 {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    .cta h2 .highlight { color: var(--orange); }

    .cta p {
      color: var(--text-muted);
      font-size: 17px;
      max-width: 520px;
      margin: 0 auto 28px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--orange);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
    }

    .btn-primary:hover {
      background: var(--orange-dark);
      box-shadow: 0 0 28px var(--orange-glow);
      transform: translateY(-1px);
    }

    /* ── FOOTER ───────────────────────────────────────────── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      text-align: center;
      color: var(--text-faint);
      font-size: 13px;
    }

    .footer a { color: var(--text-muted); transition: color var(--transition); }
    .footer a:hover { color: var(--orange-light); }

    .footer-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 8px;
    }

    /* ── AILo branding — L itálico em todas as ocorrências ────────── */
    .ailo-l { font-style: italic; font-weight: inherit; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="container nav-inner">
      <a href="https://sentinelinvest.co" class="nav-logo">
        <span class="nav-logo-icon">◆</span>
        <span>Sentinel</span>
      </a>
      <div class="nav-right">
        <a href="../index.html" class="nav-back" data-i18n="nav.back"></a>
        <div class="lang-selector" id="langSelector">
          <button class="lang-btn" id="langBtn" aria-haspopup="true" aria-expanded="false">
            <span class="lang-flag" id="currentFlag"></span>
            <span class="lang-code" id="currentCode"></span>
            <span class="lang-chevron">▾</span>
          </button>
          <div class="lang-dropdown" id="langDropdown" role="menu">
            <button class="lang-option" data-lang="pt" role="menuitem">🇧🇷 Português</button>
            <div class="lang-option-sep"></div>
            <button class="lang-option" data-lang="es" role="menuitem">🇪🇸 Español</button>
            <div class="lang-option-sep"></div>
            <button class="lang-option" data-lang="en" role="menuitem">🇺🇸 English</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-glow"></div>
    <div class="container">
      <div class="breadcrumb"><a href="../index.html" data-i18n="breadcrumb.demos"></a> / <span data-i18n="breadcrumb.current"></span></div>
      <div class="badge" data-i18n="hero.badge"></div>
      <h1 data-i18n-html="hero.title"></h1>
      <p class="lede" data-i18n="hero.lede"></p>
    </div>
  </section>

  <!-- PROBLEM -->
  <div class="container">
    <div class="section-block">
      <div class="kicker" data-i18n="problem.kicker"></div>
      <h2 data-i18n="problem.title"></h2>
      <div class="problem-card">
        <p data-i18n-html="problem.body"></p>
      </div>
    </div>

    <!-- HOW -->
    <div class="section-block">
      <div class="kicker" data-i18n="how.kicker"></div>
      <h2 data-i18n="how.title"></h2>
      <div class="steps">
        <div class="step">
          <div class="step-number">1</div>
          <h3 data-i18n="step1.title"></h3>
          <p data-i18n="step1.body"></p>
        </div>
        <div class="step">
          <div class="step-number">2</div>
          <h3 data-i18n="step2.title"></h3>
          <p data-i18n="step2.body"></p>
        </div>
        <div class="step">
          <div class="step-number">3</div>
          <h3 data-i18n="step3.title"></h3>
          <p data-i18n="step3.body"></p>
        </div>
      </div>
    </div>

    <!-- VIDEO -->
    <div class="section-block">
      <div class="kicker" data-i18n="video.kicker"></div>
      <h2 data-i18n="video.title"></h2>
      <p data-i18n="video.sub"></p>
      <div class="video-wrapper">
        <div class="video-embed">
          <video controls preload="metadata" playsinline style="width:100%;height:100%;background:#000;object-fit:contain;">
            <source src="../videos/consolidada-04.webm" type="video/webm">
            <div class="video-placeholder">
              <div class="video-placeholder-icon">▶</div>
              <span data-i18n="video.placeholder"></span>
            </div>
          </video>
        </div>
      </div>
      <div class="video-caption" data-i18n="video.caption"></div>
    </div>

    <!-- WHY -->
    <div class="section-block">
      <div class="kicker" data-i18n="why.kicker"></div>
      <h2 data-i18n="why.title"></h2>
      <div class="why-grid">
        <div class="why-card">
          <div class="icon">🔍</div>
          <h4 data-i18n="why.1.title"></h4>
          <p data-i18n="why.1.body"></p>
        </div>
        <div class="why-card">
          <div class="icon">📈</div>
          <h4 data-i18n="why.2.title"></h4>
          <p data-i18n="why.2.body"></p>
        </div>
        <div class="why-card">
          <div class="icon">🧭</div>
          <h4 data-i18n="why.3.title"></h4>
          <p data-i18n="why.3.body"></p>
        </div>
      </div>
    </div>

    <!-- EXAMPLE -->
    <div class="section-block">
      <div class="kicker" data-i18n="example.kicker"></div>
      <h2 data-i18n="example.title"></h2>
      <p data-i18n="example.sub"></p>

      <div class="example-card">
        <div class="example-header">
          <div>
            <div class="example-title" data-i18n="example.profile"></div>
            <div class="example-meta" data-i18n-html="example.metaline"></div>
          </div>
          <span class="regime-badge">
            <span class="dot"></span>
            <span data-i18n="regime.label"></span>
          </span>
        </div>

        <table class="example-table">
          <thead>
            <tr>
              <th data-i18n="table.account"></th>
              <th data-i18n="table.currency"></th>
              <th data-i18n="table.value"></th>
              <th data-i18n="table.share"></th>
            </tr>

    function detectLang() {
      const saved = localStorage.getItem('sentinel-lang');
      if (saved && T[saved]) return saved;
      const b = (navigator.language || 'en').toLowerCase();
      if (b.startsWith('pt')) return 'pt';
      if (b.startsWith('es')) return 'es';
      return 'en';
    }

    function applyLang(lang) {
      const d = T[lang];
      document.documentElement.lang = d['html.lang'];
      document.title = d['meta.title'];
      const md = document.querySelector('meta[name="description"]');
      if (md) md.setAttribute('content', d['meta.description']);

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const v = d[el.dataset.i18n];
        if (v !== undefined) el.textContent = v;
      });

      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const v = d[el.dataset.i18nHtml];
        if (v !== undefined) el.innerHTML = v;
      });

      document.getElementById('currentFlag').textContent = d['lang.flag'];
      document.getElementById('currentCode').textContent = d['lang.code'];

      document.querySelectorAll('.lang-option').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      localStorage.setItem('sentinel-lang', lang);

      italicizeAILo();
    }

    /* ── AILo branding — italiciza o "L" em cada ocorrência de "AILo" ── */
    function italicizeAILo() {
      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
        acceptNode(n) {
          if (!n.nodeValue || n.nodeValue.indexOf('AILo') === -1) return NodeFilter.FILTER_REJECT;
          const p = n.parentNode;
          if (!p) return NodeFilter.FILTER_REJECT;
          const t = p.tagName;
          if (t === 'SCRIPT' || t === 'STYLE' || t === 'TITLE' || t === 'TEXTAREA') return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      const nodes = [];
      let n; while ((n = walker.nextNode())) nodes.push(n);
      nodes.forEach(node => {
        const parts = node.nodeValue.split(/(AILo)/g);
        if (parts.length === 1) return;
        const frag = document.createDocumentFragment();
        parts.forEach(part => {
          if (part === 'AILo') {
            frag.appendChild(document.createTextNode('AI'));
            const i = document.createElement('i');
            i.className = 'ailo-l';
            i.textContent = 'L';
            frag.appendChild(i);
            frag.appendChild(document.createTextNode('o'));
          } else if (part) {
            frag.appendChild(document.createTextNode(part));
          }
        });
        node.parentNode.replaceChild(frag, node);
      });
    }

    const langBtn      = document.getElementById('langBtn');
    const langDropdown = document.getElementById('langDropdown');

    const open  = () => { langDropdown.classList.add('open');    langBtn.setAttribute('aria-expanded', 'true');  };
    const close = () => { langDropdown.classList.remove('open'); langBtn.setAttribute('aria-expanded', 'false'); };

    langBtn.addEventListener('click', e => { e.stopPropagation(); langDropdown.classList.contains('open') ? close() : open(); });
    document.addEventListener('click', close);
    langDropdown.addEventListener('click', e => e.stopPropagation());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

    document.querySelectorAll('.lang-option').forEach(btn => {
      btn.addEventListener('click', () => { applyLang(btn.dataset.lang); close(); });
    });

    applyLang(detectLang());
  </script>
