  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:        #F97316;
      --orange-light:  #FB923C;
      --orange-dark:   #EA6C0A;
      --orange-glow:   rgba(249, 115, 22, 0.25);
      --orange-subtle: rgba(249, 115, 22, 0.08);
      --bg:            #0A0A0B;
      --bg-card:       #111113;
      --bg-elevated:   #18181B;
      --border:        rgba(255, 255, 255, 0.07);
      --border-orange: rgba(249, 115, 22, 0.3);
      --text:          #FAFAFA;
      --text-muted:    #A1A1AA;
      --text-faint:    #52525B;
      --green:         #34D399;
      --radius-sm:     8px;
      --radius:        14px;
      --radius-lg:     22px;
      --transition:    0.2s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      max-width: 1120px;
      margin-inline: auto;
      padding-inline: 24px;
      position: relative;
      z-index: 1;
    }

    /* ── NAV ──────────────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 11, 0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .nav-logo-icon {
      width: 32px; height: 32px;
      background: var(--orange);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-back {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: border-color var(--transition), color var(--transition);
    }

    .nav-back:hover {
      border-color: var(--border-orange);
      color: var(--text);
    }

    /* ── Lang Selector (from landing) ─────────────────────── */
    .lang-selector { position: relative; }

    .lang-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 11px;
      cursor: pointer;
      transition: border-color var(--transition), color var(--transition);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
    }

    .lang-btn:hover,
    .lang-btn[aria-expanded="true"] { border-color: var(--border-orange); color: var(--text); }

    .lang-flag { font-size: 15px; line-height: 1; }
    .lang-code { letter-spacing: 0.04em; }

    .lang-chevron {
      font-size: 10px;
      transition: transform var(--transition);
      opacity: 0.6;
    }

    .lang-btn[aria-expanded="true"] .lang-chevron { transform: rotate(180deg); opacity: 1; }

    .lang-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      min-width: 148px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateY(-6px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
      z-index: 200;
    }

    .lang-dropdown.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .lang-option {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }

    .lang-option:hover { background: var(--orange-subtle); color: var(--text); }
    .lang-option.active { color: var(--orange-light); background: var(--orange-subtle); }
    .lang-option-sep { height: 1px; background: var(--border); }

    /* ── HERO ─────────────────────────────────────────────── */
    .hero {
      position: relative;
      padding: 80px 0 48px;
      text-align: center;
      overflow: hidden;
    }

    .hero-glow {
      position: absolute;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 600px;
      background: radial-gradient(ellipse at center, rgba(249,115,22,0.14) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 18px;
    }

    .hero h1 .highlight { color: var(--orange); }

    .hero p {
      font-size: 18px;
      color: var(--text-muted);
      max-width: 620px;
      margin-inline: auto;
      line-height: 1.7;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--orange-subtle);
      border: 1px solid var(--border-orange);
      color: var(--orange-light);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 22px;
    }

    .badge-dot {
      width: 6px; height: 6px;
      background: var(--orange);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.4); }
    }

    /* ── GRID ─────────────────────────────────────────────── */
    .features { padding: 48px 0 120px; }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .feature-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      position: relative;
      overflow: hidden;
    }

    .feature-card.available { cursor: pointer; }

    .feature-card.available:hover {
      border-color: var(--border-orange);
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--orange-subtle);
    }

    .feature-card.coming-soon { opacity: 0.55; }

    .feature-thumb {
      aspect-ratio: 16 / 9;
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .feature-thumb-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--orange-subtle) 0%, transparent 60%);
    }

    .feature-thumb span {
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }

    .feature-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .feature-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .feature-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .feature-tag.new {
      background: var(--orange-subtle);
      border: 1px solid var(--border-orange);
      color: var(--orange-light);
    }

    .feature-tag.soon {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text-faint);
    }

    .feature-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .feature-meta {
      font-size: 12px;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 4px;
      margin-top: auto;
    }

    .feature-meta-dot {
      width: 3px; height: 3px;
      background: var(--text-faint);
      border-radius: 50%;
    }

    /* ── FOOTER ───────────────────────────────────────────── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      text-align: center;
      color: var(--text-faint);
      font-size: 13px;
    }

    .footer a { color: var(--text-muted); transition: color var(--transition); }
    .footer a:hover { color: var(--orange-light); }

    .footer-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 8px;
    }

    /* ── AILo branding — L itálico em todas as ocorrências ────────── */
    .ailo-l { font-style: italic; font-weight: inherit; }
  </style>

    function detectLang() {
      const saved = localStorage.getItem('sentinel-lang');
      if (saved && T[saved]) return saved;
      const b = (navigator.language || 'en').toLowerCase();
      if (b.startsWith('pt')) return 'pt';
      if (b.startsWith('es')) return 'es';
      return 'en';
    }

    function applyLang(lang) {
      const d = T[lang];
      document.documentElement.lang = d['html.lang'];
      document.title = d['meta.title'];
      const md = document.querySelector('meta[name="description"]');
      if (md) md.setAttribute('content', d['meta.description']);

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const v = d[el.dataset.i18n];
        if (v !== undefined) el.textContent = v;
      });

      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const v = d[el.dataset.i18nHtml];
        if (v !== undefined) el.innerHTML = v;
      });

      document.getElementById('currentFlag').textContent = d['lang.flag'];
      document.getElementById('currentCode').textContent = d['lang.code'];

      document.querySelectorAll('.lang-option').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      localStorage.setItem('sentinel-lang', lang);

      italicizeAILo();
    }

    /* ── AILo branding — italiciza o "L" em cada ocorrência de "AILo" ── */
    function italicizeAILo() {
      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
        acceptNode(n) {
          if (!n.nodeValue || n.nodeValue.indexOf('AILo') === -1) return NodeFilter.FILTER_REJECT;
          const p = n.parentNode;
          if (!p) return NodeFilter.FILTER_REJECT;
          const t = p.tagName;
          if (t === 'SCRIPT' || t === 'STYLE' || t === 'TITLE' || t === 'TEXTAREA') return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      const nodes = [];
      let n; while ((n = walker.nextNode())) nodes.push(n);
      nodes.forEach(node => {
        const parts = node.nodeValue.split(/(AILo)/g);
        if (parts.length === 1) return;
        const frag = document.createDocumentFragment();
        parts.forEach(part => {
          if (part === 'AILo') {
            frag.appendChild(document.createTextNode('AI'));
            const i = document.createElement('i');
            i.className = 'ailo-l';
            i.textContent = 'L';
            frag.appendChild(i);
            frag.appendChild(document.createTextNode('o'));
          } else if (part) {
            frag.appendChild(document.createTextNode(part));
          }
        });
        node.parentNode.replaceChild(frag, node);
      });
    }

    const langBtn      = document.getElementById('langBtn');
    const langDropdown = document.getElementById('langDropdown');

    const open  = () => { langDropdown.classList.add('open');    langBtn.setAttribute('aria-expanded', 'true');  };
    const close = () => { langDropdown.classList.remove('open'); langBtn.setAttribute('aria-expanded', 'false'); };

    langBtn.addEventListener('click', e => { e.stopPropagation(); langDropdown.classList.contains('open') ? close() : open(); });
    document.addEventListener('click', close);
    langDropdown.addEventListener('click', e => e.stopPropagation());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

    document.querySelectorAll('.lang-option').forEach(btn => {
      btn.addEventListener('click', () => { applyLang(btn.dataset.lang); close(); });
    });

    applyLang(detectLang());
  </script>
